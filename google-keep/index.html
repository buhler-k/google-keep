<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOGLE-K</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>
<body>
    <nav>
        <div class="logo-area"> 
            <div class="tooltip">   
                <span class="material-symbols-outlined">menu</span>
                <span class="tooltip-text">Main Menu</span>
            </div>
            <img class="img class="gb_6c gb_ge src="https://www.gstatic.com/images/branding/productlogos/keep_2026/v2/web-48dp/logo_keep_2026_color_1x_web_48dp.png" srcset="https://www.gstatic.com/images/branding/productlogos/keep_2026/v2/web-48dp/logo_keep_2026_color_1x_web_48dp.png 1x, https://www.gstatic.com/images/branding/productlogos/keep_2026/v2/web-48dp/logo_keep_2026_color_2x_web_48dp.png 2x " alt="" aria-hidden="true" role="presentation" style="width:40px;height:40px">
            <span class="logo-text">KEEP</span>
        </div>

        <div class="search-area">
            <div class="tooltip">
                 <span class="material-symbols-outlined hover">search</span>
                 <span class="tooltip-text">Search</span>
            </div>
                <input type="text" placeholder="Search" />


        </div>

        <div class="settings-area">
            <div class="tooltip">
                <span class="material-symbols-outlined hover">refresh</span>
                <span class="tooltip-text">Refresh</span>
            </div>

            <div class="tooltip">
                <span class="material-symbols-outlined hover">list</span>
                <span class="tooltip-text">List view</span>
            </div>

            <div class="tooltip">
                <span class="material-symbols-outlined hover">settings</span>
                <span class="tooltip-text">Settings</span>
            </div>

        </div>

        <div class="profile-actions-area">
            <div class="tooltip">
                <span class="material-symbols-outlined hover">apps</span>
                <span class="tooltip-text">Google Apps</span>
            </div>


        </div>

    </nav>
    <main>
        <div class="sidebar">
            <div class="sidebar-item">
                <span class="material-symbols-outlined hover active">lightbulb</span>
                <span class="sidebar-text">Notes</span>
            </div>

            <div class="sidebar-item">
                <span class="material-symbols-outlined hover">notifications</span>
                <span class="sidebar-text">Reminders</span>
            </div>

            <div class="sidebar-item">
                <span class="material-symbols-outlined hover ">edit</span>
                <span class="sidebar-text">Edit Labels</span>
            </div>

            <div class="sidebar-item">
                <span class="material-symbols-outlined hover ">archive</span>
                <span class="sidebar-text">Archive</span>
            </div>

            <div class="sidebar-item">
                <span class="material-symbols-outlined hover ">delete</span>
                <span class="sidebar-text">Trash</span>
            </div>
        </div>

        <div class="form-container">
            <form>
                <input type="text" class="note-text" placeholder="Take a note...">
                <div class="form-actions">
                    <div class="tooltip">
                        <span class="material-symbols-outlined hover">check_box</span>
                        <span class="tooltip-text">New list</span>
                    </div>
                    <div class="tooltip">
                        <span class="material-symbols-outlined hover">brush</span>
                        <span class="tooltip-text">New note with drawing</span>
                    </div>
                    <div class="tooltip">
                        <span class="material-symbols-outlined hover">image</span>
                        <span class="tooltip-text">New note with image</span>
                    </div>

    
                </div>
            </form>
        
        
        </div>
    </main>


    <script src="googlekeep.js"></script>
</body>
</html>
