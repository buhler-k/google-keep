<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google-k</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>
<body>
    <nav>
        <div class="logo-area"> 
            <div class="tooltip">   
                <span class="material-symbols-outlined">menu</span>
                <span class="tooltip-text">Main Menu</span>
            </div>
            <img class="">
            <span class="logo-text">KEEP</span>
        </div>

        <div class="search-area">
            <div class="tooltip">
                 <span class="material-symbols-outlined">search</span>
                 <span class="tooltip-text">Search</span>
            </div>
                <input type="text" placeholder="Search">


        </div>

        <div class="settings-area">
            <div class="tooltip">
                <span class="material-symbols-outlined">refresh</span>
                <span class="tooltip-text">Refresh</span>
            </div>

            <div class="tooltip">
                <span class="material-symbols-outlined">list</span>
                <span class="tooltip-text">List view</span>
            </div>

            <div class="tooltip">
                <span class="material-symbols-outlined">settings</span>
                <span class="tooltip-text">Settings</span>
            </div>

        </div>

        <div class="profile-actions-area">
            <div class="tooltip">
                <span class="material-symbols-outlined">apps</span>
                <span class="tooltip-text">Google Apps</span>
            </div>

            <div class="tooltip">
                <span class="material-symbols-outlined">account-circle</span>
                <span class="tooltip-text">Google Account</span>
            </div>

        </div>

    </nav>
    

    <script src="googlekeep.js"></script>
</body>
